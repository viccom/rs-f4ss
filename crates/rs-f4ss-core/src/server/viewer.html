  function render() {
    const entries = DATA.entries || [];
    const folders = entries.filter(function(e){ return e.kind === 'folder'; });
    const files = entries.filter(function(e){ return e.kind !== 'folder'; });

    folderGrid.innerHTML = folders.map(function(e, i){ return tileHTML(e, i); }).join('');
    fileGrid.innerHTML = files.map(function(e, i){ return tileHTML(e, folders.length + i); }).join('');
    listBody.innerHTML = entries.map(rowHTML).join('');

    folderLabel.classList.toggle('is-empty', folders.length === 0);
    fileLabel.classList.toggle('is-empty', files.length === 0);
    emptyState.hidden = entries.length > 0;

    const totalSize = files.reduce(function(s, f){ return s + (f.size || 0); }, 0);
    document.getElementById('itemCount').textContent = entries.length;
    document.getElementById('totalSize').textContent = fmtSize(totalSize);
    document.getElementById('statCount').textContent = entries.length;
    document.getElementById('statSize').textContent = fmtSize(totalSize);
    const lastUpdate = entries.reduce(function(m, e){ return Math.max(m, e.mtime_ts || 0); }, 0);
    document.getElementById('updatedAt').textContent = lastUpdate ? ('更新于 ' + fmtTime(new Date(lastUpdate * 1000).toISOString())) : '—';

    const segs = path.split('/').filter(Boolean);
    const title = segs.length === 0 ? 'root' : segs[segs.length - 1];
    document.getElementById('pageTitle').innerHTML = esc(title).replace(/^(\w)/, '<em>$1</em>');

    const u = new URL(window.location.href);
    u.searchParams.set('view', 'raw');
    document.getElementById('rawLink').href = u.toString();

    bindTileEvents();
  }

  // ---------- 选中 / 详情 / 操作 ----------
  const inspector = document.getElementById('inspector');
  const inspClose = document.getElementById('inspClose');
  let selected = null;

  function selectTile(tile) {
    document.querySelectorAll('.tile.selected, .row.selected').forEach(function(x){ x.classList.remove('selected'); });
    if (tile) {
      tile.classList.add('selected');
      selected = tile;
      const href = tile.getAttribute('data-href');
      const name = tile.getAttribute('data-name');
      const entry = (DATA.entries || []).find(function(e){ return e.href === href || e.name === name; });
      if (entry) showInspector(entry, tile.getAttribute('data-kind') === 'folder');
    } else {
      selected = null;
    }
  }
  function showInspector(entry, isDir) {
    document.getElementById('inspTitle').textContent = entry.name;
    document.getElementById('inspSub').textContent =
      (isDir ? '文件夹' : (entry.ext || entry.kind || '文件').toLowerCase()) +
      (entry.mtime ? ' · 修改于 ' + fmtTime(entry.mtime) : '');
    const prev = document.getElementById('inspIcon');
    prev.innerHTML = iconForKind(isDir ? 'folder' : entry.kind, entry.name);
    const acts = document.getElementById('inspActions');
    if (isDir) {
      acts.innerHTML = '<button class="primary" id="inspOpen">进入</button>' +
        (readOnly ? '' : '<button class="danger" id="inspDelete">删除</button>');
      document.getElementById('inspOpen').onclick = function(){ go(entry.href); };
      if (!readOnly) document.getElementById('inspDelete').onclick = function(){ del(entry); };
    } else {
      // Preview button appears first when the kind is previewable — it's the
      // primary action for code/text/image/video files. Download stays one
      // tap away for users who still want the raw file.
      const previewBtn = isPreviewable(entry.kind)
        ? '<button class="primary" id="inspPreview">预览</button>' : '';
      acts.innerHTML = previewBtn +
        '<button class="' + (previewBtn ? '' : 'primary ') + 'secondary" id="inspDownload">下载</button>' +
        (readOnly ? '' : '<button class="danger" id="inspDelete">删除</button>');
      const pb = document.getElementById('inspPreview');
      if (pb) {
        pb.onclick = function(){
          const tile = document.querySelector('.tile.selected, .row.selected');
          if (tile) openPreview(tile);
        };
      }
      document.getElementById('inspDownload').onclick = function(){ download(entry); };
      if (!readOnly) document.getElementById('inspDelete').onclick = function(){ del(entry); };
    }
    const attrs = document.getElementById('inspAttrs');
    const rows = [
      ['大小', isDir ? '—' : fmtSize(entry.size)],
      ['类型', isDir ? '文件夹' : (entry.ext ? entry.ext.toUpperCase() + ' · ' : '') + (entry.kind || '文件')],
      ['修改时间', entry.mtime ? fmtTime(entry.mtime) : '—'],
      ['路径', path === '/' ? '/' + entry.name : path + '/' + entry.name]
    ];
    attrs.innerHTML = rows.map(function(r){ return '<dt>' + esc(r[0]) + '</dt><dd>' + esc(r[1]) + '</dd>'; }).join('');
    const prefix = path.endsWith('/') ? path : path + '/';
    const link = window.location.origin + prefix + entry.href +
      (entry.kind === 'folder' && !entry.href.endsWith('/') ? '/' : '');
    document.getElementById('shareLinkUrl').textContent = link;
    inspector.classList.add('open');
    inspector.setAttribute('aria-hidden', 'false');
  }
  function hideInspector() {
    inspector.classList.remove('open');
    inspector.setAttribute('aria-hidden', 'true');
  }
  inspClose.addEventListener('click', hideInspector);

  // ---------- 文件预览 Modal ----------
  // Kinds the modal can render. 'code' and 'doc' both go through the text view
  // (no syntax highlighting — kept self-contained; viewer.html would otherwise
  // need to inline Prism ~80 KB or fetch from a CDN, breaking the offline story).
  const PREVIEWABLE = { code: 'text', doc: 'text', img: 'image', video: 'video' };
  function isPreviewable(kind) { return Object.prototype.hasOwnProperty.call(PREVIEWABLE, kind); }

  const pmodal = document.getElementById('pmodal');
  const pmodalBody = document.getElementById('pmodalBody');
  const pmodalTitle = document.getElementById('pmodalTitle');
  const pmodalMeta = document.getElementById('pmodalMeta');
  const pmodalDownload = document.getElementById('pmodalDownload');
  const pmodalCopy = document.getElementById('pmodalCopy');
  const pmodalClose = document.getElementById('pmodalClose');
  const pmodalBack = document.getElementById('pmodalBack');
  let pmodalState = { kind: null, url: null, text: '' };
  // Remember which tile/row opened the modal so closePreview can restore
  // focus there (WCAG 2.4.3 — focus must return to the trigger on close).
  let pmodalReturnFocus = null;
  // Focusable controls inside the modal head, in tab order. Cycling Tab /
  // Shift+Tab among them is the focus trap — there are no other interactive
  // elements in the modal that should steal focus.
  const pmodalFocusables = [pmodalCopy, pmodalDownload, pmodalClose];

  function openPreview(tileOrRow) {
    const name = tileOrRow.getAttribute('data-name');
    const kind = tileOrRow.getAttribute('data-kind');
    const href = tileOrRow.getAttribute('data-href');
    // Resolve relative to the current page so the preview fetch hits the
    // same directory we're browsing — using `origin` would strip the path.
    const url = new URL(href, window.location.href).toString();
    const entry = (DATA.entries || []).find(function(e){ return e.name === name; });
    const sizeStr = entry && entry.size != null ? fmtSize(entry.size) : '';
    const ext = entry && entry.ext ? entry.ext.toUpperCase() : (kind || '').toUpperCase();

    pmodalTitle.textContent = name;
    pmodalMeta.textContent = [ext, sizeStr].filter(Boolean).join(' · ');
    pmodalDownload.href = url;
    pmodalDownload.setAttribute('download', name);
    pmodalState = { kind: PREVIEWABLE[kind], url, text: '' };
    pmodalReturnFocus = tileOrRow;

    if (PREVIEWABLE[kind] === 'image') {
      renderImagePreview(url, name);
    } else if (PREVIEWABLE[kind] === 'video') {
      renderVideoPreview(url, name);
    } else {
      loadTextPreview(url, name);
    }

    pmodal.classList.add('open');
    pmodal.setAttribute('aria-hidden', 'false');
    requestAnimationFrame(function(){ pmodalClose.focus(); });
  }

  function closePreview() {
    pmodal.classList.remove('open');
    pmodal.setAttribute('aria-hidden', 'true');
    pmodalBody.innerHTML = '';
    pmodalState = { kind: null, url: null, text: '' };
    // Restore focus to the tile/row that opened the modal, falling back to
    // the body if the trigger has since been removed (e.g. after delete).
    if (pmodalReturnFocus && document.body.contains(pmodalReturnFocus)) {
      pmodalReturnFocus.focus();
    }
    pmodalReturnFocus = null;
  }

  pmodalClose.addEventListener('click', closePreview);
  pmodalBack.addEventListener('click', closePreview);

  function renderState(html) {
    pmodalBody.innerHTML = '<div class="pmodal-state">' + html + '</div>';
  }

  function renderImagePreview(url, name) {
    pmodalCopy.hidden = true;
    pmodalBody.innerHTML =
      '<figure class="pmodal-image">' +
        '<img src="' + esc(url) + '" alt="' + esc(name) + '">' +
        '<figcaption>' + esc(name) + '</figcaption>' +
      '</figure>';
    const img = pmodalBody.querySelector('img');
    img.addEventListener('error', function(){
      renderState('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg><strong>图片加载失败</strong><span>文件可能已损坏或格式不受支持</span>');
    });
  }

  function renderVideoPreview(url, name) {
    pmodalCopy.hidden = true;
    pmodalBody.innerHTML =
      '<div class="pmodal-video">' +
        '<video controls preload="metadata" src="' + esc(url) + '"></video>' +
        '<span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-500)">' + esc(name) + '</span>' +
      '</div>';
    const v = pmodalBody.querySelector('video');
    v.addEventListener('error', function(){
      renderState('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg><strong>视频加载失败</strong><span>文件可能已损坏或编解码器不受支持</span>');
    });
  }

  const TEXT_MAX_BYTES = 2 * 1024 * 1024;

  // ----- Syntax highlighting + Markdown rendering (lazy-loaded) -----
  // The page boots ~165KB lighter by deferring Prism (83KB), marked (39KB),
  // and DOMPurify (22KB) until the first text preview is requested. The
  // server bundles them at /_static/{prism,marked,purify}.{js,css} with a
  // long max-age so subsequent previews hit the browser cache.
  //
  // DOMPurify is mandatory: marked v15+ does not sanitize HTML, so a
  // malicious .md file containing `<img onerror=...>` or `<svg onload=...>`
  // would otherwise execute JavaScript in the share origin — full access
  // to the local file server. We sanitize with the HTML profile and then
  // hand the result to Prism for in-code-block highlighting.
  let syntaxLoadPromise = null;
  function loadSyntaxAssets() {
    if (typeof window.Prism === 'object' && window.Prism && typeof window.Prism.highlight === 'function' && typeof window.marked === 'object' && typeof window.marked.parse === 'function' && typeof window.DOMPurify === 'function') {
      return Promise.resolve();
    }
    if (syntaxLoadPromise) return syntaxLoadPromise;
    syntaxLoadPromise = new Promise(function(resolve, reject){
      let pending = 4;
      let failed = false;
      function done(err){
        if (err && !failed) { failed = true; reject(err); }
        if (--pending === 0 && !failed) resolve();
      }
      if (!document.getElementById('_static-prism-css')) {
        const link = document.createElement('link');
        link.id = '_static-prism-css';
        link.rel = 'stylesheet';
        link.href = '/_static/prism.css';
        link.onload = function(){ done(); };
        link.onerror = function(){ done(new Error('prism.css')); };
        document.head.appendChild(link);
      } else { done(); }
      if (!document.getElementById('_static-prism-js')) {
        const s1 = document.createElement('script');
        s1.id = '_static-prism-js';
        s1.src = '/_static/prism.js';
        s1.async = false;
        s1.onload = function(){ done(); };
        s1.onerror = function(){ done(new Error('prism.js')); };
        document.head.appendChild(s1);
      } else { done(); }
      if (!document.getElementById('_static-marked-js')) {
        const s2 = document.createElement('script');
        s2.id = '_static-marked-js';
        s2.src = '/_static/marked.js';
        s2.async = false;
        s2.onload = function(){ done(); };
        s2.onerror = function(){ done(new Error('marked.js')); };
        document.head.appendChild(s2);
      } else { done(); }
      if (!document.getElementById('_static-purify-js')) {
        const s3 = document.createElement('script');
        s3.id = '_static-purify-js';
        s3.src = '/_static/purify.min.js';
        s3.async = false;
        s3.onload = function(){ done(); };
        s3.onerror = function(){ done(new Error('purify.min.js')); };
        document.head.appendChild(s3);
      } else { done(); }
    }).catch(function(err){
      syntaxLoadPromise = null;
      throw err;
    });
    return syntaxLoadPromise;
  }

  const LANG_BY_EXT = {
    'c': 'c', 'h': 'c',
    'cpp': 'cpp', 'cxx': 'cpp', 'cc': 'cpp', 'hpp': 'cpp', 'hh': 'cpp',
    'css': 'css', 'scss': 'css', 'less': 'css',
    'html': 'markup', 'htm': 'markup', 'xml': 'markup', 'svg': 'markup', 'vue': 'markup', 'svelte': 'markup',
    'js': 'javascript', 'mjs': 'javascript', 'cjs': 'javascript', 'jsx': 'jsx',
    'ts': 'typescript', 'tsx': 'tsx',
    'py': 'python', 'rs': 'rust', 'go': 'go',
    'java': 'java', 'kt': 'kotlin', 'scala': 'scala',
    'rb': 'ruby', 'pl': 'perl', 'php': 'php',
    'sh': 'bash', 'bash': 'bash', 'zsh': 'bash',
    'json': 'json', 'json5': 'json', 'jsonc': 'json',
    'yaml': 'yaml', 'yml': 'yaml', 'toml': 'toml',
    'sql': 'sql', 'graphql': 'graphql', 'gql': 'graphql',
    'dockerfile': 'dockerfile', 'ini': 'ini', 'cfg': 'ini', 'conf': 'ini',
    'properties': 'properties', 'proto': 'protobuf',
    'lua': 'lua', 'swift': 'swift', 'r': 'r',
    'vim': 'vim', 'diff': 'diff', 'patch': 'diff',
    'makefile': 'makefile', 'mk': 'makefile',
    'md': 'markdown', 'markdown': 'markdown',
    'log': 'plaintext', 'txt': 'plaintext', 'csv': 'plaintext',
  };

  function extOf(name) {
    const m = /\.([a-z0-9]+)(?:\?|#|$)/i.exec(name || '');
    return m ? m[1].toLowerCase() : '';
  }
  function isMarkdownName(name) {
    const e = extOf(name);
    return e === 'md' || e === 'markdown';
  }
  function langFor(name) {
    const e = extOf(name);
    return LANG_BY_EXT[e] || 'plaintext';
  }

  // Rebalance <span> tags that cross line boundaries so each line can be
  // rendered independently with its own line number, without breaking the
  // tokenisation Prism produces for the whole document.
  function splitHighlightedLines(html) {
    const parts = html.split('\n');
    const result = [];
    let carry = '';
    for (let i = 0; i < parts.length; i++) {
      const line = carry + parts[i];
      const opens = (line.match(/<span[^>]*>/g) || []).length;
      const closes = (line.match(/<\/span>/g) || []).length;
      const unclosed = opens - closes;
      if (unclosed > 0) {
        result.push(line + '</span>'.repeat(unclosed));
        const allOpens = line.match(/<span[^>]*>/g) || [];
        carry = allOpens.slice(-unclosed).join('');
      } else {
        result.push(line);
        carry = '';
      }
    }
    return result;
  }

  function loadTextPreview(url, name) {
    pmodalCopy.hidden = true;
    renderState('<div class="pmodal-spin"></div><span>正在加载…</span>');
    fetch(url, { headers: { 'Range': 'bytes=0-' + TEXT_MAX_BYTES } })
      .then(function(res){
        if (res.status === 206) {
          const cr = res.headers.get('content-range');
          if (cr) {
            const m = /\/(\d+)$/.exec(cr);
            if (m && parseInt(m[1], 10) > TEXT_MAX_BYTES) {
              throw new Error('too-large');
            }
          }
          return res.text().then(function(t){ return { text: t, truncated: false }; });
        }
        if (res.ok) {
          return res.text().then(function(t){
            if (t.length > TEXT_MAX_BYTES) throw new Error('too-large');
            return { text: t, truncated: false };
          });
        }
        throw new Error('http ' + res.status);
      })
      .then(function(r){
        // Show plain text immediately (sub-50ms) and upgrade to highlighted
        // rendering once Prism/marked finish loading. Subsequent previews
        // skip the wait because the assets are now cached.
        pmodalState.url = url;
        renderTextPreview(r.text, name, false);
        loadSyntaxAssets().then(function(){
          if (pmodalState && pmodalState.url === url) {
            renderTextPreview(r.text, name, true);
          }
        }).catch(function(){
          /* assets unavailable — plain text is already on screen */
        });
      })
      .catch(function(err){
        if (err && err.message === 'too-large') {
          renderState('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg><strong>文件过大，无法预览</strong><span>文本预览上限 2 MB，请使用「下载」按钮获取原文件</span>');
        } else {
          renderState('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg><strong>加载失败</strong><span>' + esc((err && err.message) || '网络错误') + '</span>');
        }
      });
  }

  function renderTextPreview(text, name, highlighted) {
    pmodalState.text = text;

    if (isMarkdownName(name) && highlighted && typeof window.marked === 'object' && typeof window.marked.parse === 'function') {
      // Render as reading view: marked → DOMPurify → HTML, then Prism on
      // every fenced <pre><code class="language-xxx"> block, with horizontal
      // scroll wrappers on tables for narrow viewports. The sanitiser sits
      // BEFORE innerHTML — marked v15+ does not strip `<script>`, event
      // handlers, or `javascript:` URLs on its own, so we route its output
      // through DOMPurify with the HTML profile before any sink.
      const container = document.createElement('div');
      container.className = 'pmodal-md';
      try {
        window.marked.setOptions({ gfm: true, breaks: false });
        const raw = window.marked.parse(text);
        const clean = (typeof window.DOMPurify === 'function')
          ? window.DOMPurify.sanitize(raw, { USE_PROFILES: { html: true } })
          : raw;
        container.innerHTML = clean;
      } catch (e) {
        container.textContent = text;
        pmodalBody.innerHTML = '';
        pmodalBody.appendChild(container);
        pmodalCopy.hidden = !text;
        return;
      }
      container.querySelectorAll('table').forEach(function(t){
        const wrap = document.createElement('div');
        wrap.className = 'pmodal-md-tablewrap';
        t.parentNode.insertBefore(wrap, t);
        wrap.appendChild(t);
      });
      if (window.Prism && typeof window.Prism.highlight === 'function') {
        container.querySelectorAll('pre code').forEach(function(code){
          const cls = code.className || '';
          const m = /language-(\S+)/.exec(cls);
          if (!m) return;
          const lang = m[1];
          const grammar = window.Prism.languages[lang];
          if (!grammar) return;
          const src = code.textContent;
          const html = window.Prism.highlight(src, grammar, lang);
          code.innerHTML = html;
          code.className = 'language-' + lang;
        });
      }
      pmodalBody.innerHTML = '';
      pmodalBody.appendChild(container);
      pmodalCopy.hidden = !text;
      return;
    }

    if (highlighted && typeof window.Prism === 'object' && window.Prism && typeof window.Prism.highlight === 'function') {
      const lang = langFor(name);
      let html;
      if (lang && lang !== 'plaintext' && window.Prism.languages[lang]) {
        try { html = window.Prism.highlight(text, window.Prism.languages[lang], lang); }
        catch (_) { html = null; }
      }
      if (html) {
        const lines = splitHighlightedLines(html);
        let gutterHtml = '';
        let codeHtml = '';
        for (let i = 0; i < lines.length; i++) {
          gutterHtml += '<span>' + (i + 1) + '</span>';
          codeHtml += lines[i] + '\n';
        }
        pmodalBody.innerHTML =
          '<div class="pmodal-text">' +
            '<div class="pmodal-gutter" aria-hidden="true">' + gutterHtml + '</div>' +
            '<pre class="pmodal-code language-' + lang + '">' + codeHtml + '</pre>' +
          '</div>';
        pmodalCopy.hidden = !text;
        return;
      }
    }

    pmodalState.text = text;
    pmodalCopy.hidden = !text;
    const lines = text.split('\n');
    const last = lines.length - 1;
    let gutterHtml = '';
    let codeHtml = '';
    for (let i = 0; i < lines.length; i++) {
      gutterHtml += '<span>' + (i + 1) + '</span>';
      const line = i === last && lines[i] === '' ? ' ' : esc(lines[i]);
      codeHtml += line + '\n';
    }
    pmodalBody.innerHTML =
      '<div class="pmodal-text">' +
        '<div class="pmodal-gutter" aria-hidden="true">' + gutterHtml + '</div>' +
        '<pre class="pmodal-code">' + codeHtml + '</pre>' +
      '</div>';
  }

  pmodalCopy.addEventListener('click', function(){
    if (!pmodalState.text) return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(pmodalState.text).then(function(){ toast('内容已复制'); }).catch(function(){ toast('复制失败'); });
    } else {
      const ta = document.createElement('textarea');
      ta.value = pmodalState.text;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); toast('内容已复制'); } catch (_) { toast('复制失败'); }
      document.body.removeChild(ta);
    }
  });

  // The same action that a double-click triggers — used by the keydown
  // handler so keyboard users can also activate folders / previews / files
  // (the click handler in `bindTileEvents` only does `selectTile`, which
  // means Tab + Enter would otherwise leave keyboard users stuck on
  // selection).
  function activateTile(t) {
    const h = t.getAttribute('data-href');
    const k = t.getAttribute('data-kind');
    if (k === 'folder') { go(h); return; }
    if (isPreviewable(k)) { openPreview(t); return; }
    download({ name: t.getAttribute('data-name'), href: h });
  }

  function bindTileEvents() {
    document.querySelectorAll('.tile').forEach(function(t){
      t.addEventListener('click', function(e){
        if (e.target.closest('.tile-actions')) return;
        selectTile(t);
      });
      t.addEventListener('dblclick', function(){ activateTile(t); });
      const enter = t.querySelector('.enter');
      if (enter) enter.addEventListener('click', function(e){ e.stopPropagation(); go(t.getAttribute('data-href')); });
      const dl = t.querySelector('.download');
      if (dl) dl.addEventListener('click', function(e){
        e.stopPropagation();
        download({ name: t.getAttribute('data-name'), href: t.getAttribute('data-href') });
      });
      const delb = t.querySelector('.delete');
      if (delb) delb.addEventListener('click', function(e){
        e.stopPropagation();
        del({ name: t.getAttribute('data-name'), href: t.getAttribute('data-href'), kind: t.getAttribute('data-kind') });
      });
    });
    document.querySelectorAll('.row:not(.row-head)').forEach(function(r){
      r.addEventListener('click', function(e){
        if (e.target.closest('.ractions')) return;
        selectTile(r);
      });
      r.addEventListener('dblclick', function(){ activateTile(r); });
    });
  }

  // ---------- 视图切换 ----------
  const ws = document.getElementById('workspace');
  const vg = document.getElementById('vGrid');
  const vl = document.getElementById('vList');
  vg.addEventListener('click', function(){
    ws.classList.remove('is-list');
    vg.classList.add('on'); vg.setAttribute('aria-pressed', 'true');
    vl.classList.remove('on'); vl.setAttribute('aria-pressed', 'false');
  });
  vl.addEventListener('click', function(){
    ws.classList.add('is-list');
    vl.classList.add('on'); vl.setAttribute('aria-pressed', 'true');
    vg.classList.remove('on'); vg.setAttribute('aria-pressed', 'false');
  });

  // ---------- 导航 ----------
  function go(href) {
    // Resolve against the current page URL, not just the origin — the
    // server emits relative hrefs (e.g. "rs-f4ss-cli/") for every entry, so
    // using `origin` would strip the current path and send the user to the
    // wrong place. Falls back to origin for absolute URLs.
    const u = new URL(href, window.location.href);
    if (!u.searchParams.has('view')) u.searchParams.set('view', 'ui');
    window.location.href = u.toString();
  }
  function download(entry) {
    if (!entry.href) return;
    const u = new URL(entry.href, window.location.href);
    window.location.href = u.toString();
  }

  // ---------- 上传 / 删除 / 新建 ----------
  const filePicker = document.getElementById('filePicker');
  document.getElementById('uploadBtn').addEventListener('click', function(){
    if (readOnly) { toast('当前为只读模式'); return; }
    filePicker.click();
  });
  filePicker.addEventListener('change', function(){
    const files = Array.from(filePicker.files || []);
    if (files.length) uploadFiles(files);
    filePicker.value = '';
  });
  async function uploadFiles(files) {
    if (readOnly) return;
    const results = []; // {name, ok, status}
    for (let i = 0; i < files.length; i++) {
      const f = files[i];
      try {
        const u = new URL((path === '/' ? '' : path) + '/' + encodeURIComponent(f.name), window.location.origin);
        const res = await fetch(u.toString(), { method: 'PUT', body: f });
        results.push({ name: f.name, ok: res.ok, status: res.status });
      } catch (e) {
        results.push({ name: f.name, ok: false, status: 0, err: e });
      }
    }
    const ok = results.filter(function(r){ return r.ok; }).length;
    const failed = results.filter(function(r){ return !r.ok; });
    if (ok && !failed.length) {
      toast('已上传 ' + ok + ' 个文件');
      setTimeout(function(){ window.location.reload(); }, 600);
    } else if (ok && failed.length) {
      const first = failed[0];
      toast('已上传 ' + ok + ' 个，' + failed.length + ' 个失败：' + first.name +
            (first.status ? ' ' + httpStatusText(first.status, '失败') : ' 网络错误'));
      console.warn('upload failures', failed);
    } else {
      const first = failed[0] || {};
      toast('上传失败：' + (first.status ? httpStatusText(first.status, '') : '网络中断'));
      console.warn('upload failures', failed);
    }
  }
  async function del(entry) {
    if (readOnly) return;
    if (!confirm('确认删除 "' + entry.name + '"?' + (entry.kind === 'folder' ? '\n目录及其内容将一并删除。' : ''))) return;
    const u = new URL(entry.href, window.location.href);
    let res;
    try {
      res = await fetch(u.toString(), { method: 'DELETE' });
    } catch (e) {
      toast(netErrMsg('删除'));
      return;
    }
    if (res.ok || res.status === 204) { toast('已删除 ' + entry.name); setTimeout(function(){ window.location.reload(); }, 500); }
    else toast(httpStatusText(res.status, '删除失败'));
  }
  document.getElementById('newFolderBtn').addEventListener('click', async function(){
    if (readOnly) { toast('当前为只读模式'); return; }
    const name = prompt('新建文件夹名称');
    if (!name) return;
    if (!/^[^/\x00]{1,255}$/.test(name)) { toast('名称非法'); return; }
    const u = new URL((path === '/' ? '' : path) + '/' + encodeURIComponent(name) + '/', window.location.origin);
    let res;
    try {
      res = await fetch(u.toString(), { method: 'MKCOL' });
    } catch (e) {
      toast(netErrMsg('创建'));
      return;
    }
    if (res.ok) { toast('已创建 ' + name); setTimeout(function(){ window.location.reload(); }, 500); }
    else toast(httpStatusText(res.status, '创建失败'));
  });

  // ---------- 拖放 ----------
  const dz = document.getElementById('dropzone');
  const dropHint = document.getElementById('dropHint');
  if (!readOnly) {
    let dragCount = 0;
    window.addEventListener('dragenter', function(e){
      if (!e.dataTransfer.types.includes('Files')) return;
      dragCount++; dz.classList.add('show'); dz.setAttribute('aria-hidden', 'false');
    });
    window.addEventListener('dragleave', function(){
      dragCount--; if (dragCount <= 0) { dz.classList.remove('show'); dz.setAttribute('aria-hidden', 'true'); dragCount = 0; }
    });
    window.addEventListener('dragover', function(e){ if (e.dataTransfer.types.includes('Files')) e.preventDefault(); });
    window.addEventListener('drop', function(e){
      if (!e.dataTransfer.types.includes('Files')) return;
      e.preventDefault(); dragCount = 0;
      dz.classList.remove('show'); dz.setAttribute('aria-hidden', 'true');
      const files = Array.from(e.dataTransfer.files || []);
      if (files.length) uploadFiles(files);
    });
  } else {
    dropHint.textContent = '当前为只读模式,无法上传';
    document.getElementById('uploadBtn').disabled = true;
    document.getElementById('uploadBtnLabel').textContent = '只读';
  }

  // ---------- Toast ----------
  const toastEl = document.getElementById('toast');
  let toastTimer;
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toastEl.classList.remove('show'); }, 2400);
  }
  // Translate HTTP status codes to user-readable Chinese messages.
  function httpStatusText(status, fallback) {
    if (status === 401 || status === 403) return '需要登录或权限不足';
    if (status === 404) return '目标不存在';
    if (status === 409) return '目标已存在';
    if (status === 413) return '文件超过 2 GB 上限';
    if (status === 416) return '读取范围越界';
    if (status === 423) return '目标被锁定';
    if (status === 507) return '服务器空间不足';
    if (status >= 500) return '服务器错误 (' + status + ')';
    return fallback + ' (' + status + ')';
  }
  // Network/offline failure message (used in catch branches).
  function netErrMsg(action) { return action + '失败：网络中断或服务不可用'; }

  // Last-line-of-defence: surface any unhandled promise rejection as a toast.
  window.addEventListener('unhandledrejection', function(e){
    console.error('unhandledrejection', e.reason);
    toast('操作未完成：' + (e.reason && e.reason.message ? e.reason.message : '未知错误'));
  });

  // ---------- 复制链接 ----------
  document.getElementById('copyLinkBtn').addEventListener('click', function(){
    const url = document.getElementById('shareLinkUrl').textContent;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(function(){ toast('链接已复制'); }).catch(function(){ toast('复制失败'); });
    } else {
      toast('当前浏览器不支持剪贴板');
    }
  });

  // ---------- 搜索过滤 ----------
  document.getElementById('searchInput').addEventListener('input', function(e){
    const q = e.target.value.trim().toLowerCase();
    document.querySelectorAll('.tile').forEach(function(t){
      const n = t.getAttribute('data-name').toLowerCase();
      t.style.display = (!q || n.includes(q)) ? '' : 'none';
    });
    document.querySelectorAll('.row:not(.row-head)').forEach(function(r){
      const n = r.getAttribute('data-name').toLowerCase();
      r.style.display = (!q || n.includes(q)) ? '' : 'none';
    });
  });

  // ---------- 键盘 ----------
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape') {
      // Preview modal takes priority over dropzone and inspector — once
      // a file is open the user is most likely trying to dismiss it.
      if (pmodal.classList.contains('open')) {
        closePreview();
        return;
      }
      // Dropzone (open via drag-enter) takes priority over inspector —
      // a stale drag overlay is more annoying to dismiss than a side panel.
      if (dz.classList.contains('show')) {
        dz.classList.remove('show');
        dz.setAttribute('aria-hidden', 'true');
        dragCount = 0;
        return;
      }
      hideInspector();
      return;
    }
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
    if (e.key === 'Backspace' && selected && !readOnly) {
      const entry = (DATA.entries || []).find(function(x){ return x.name === selected.getAttribute('data-name'); });
      if (entry) { e.preventDefault(); del(entry); }
    }
    // Focus trap: while the modal is open, cycle Tab / Shift+Tab among the
    // head controls so focus never escapes to the dimmed background.
    if (pmodal.classList.contains('open') && e.key === 'Tab') {
      const visible = pmodalFocusables.filter(function(el){ return el && !el.hidden && el.offsetParent !== null; });
      if (visible.length === 0) return;
      const first = visible[0];
      const last = visible[visible.length - 1];
      const active = document.activeElement;
      // Anything outside the modal (or on a control we no longer consider
      // focusable) — snap back to the head.
      if (!pmodal.contains(active)) {
        e.preventDefault();
        (e.shiftKey ? last : first).focus();
      } else if (e.shiftKey && active === first) {
        e.preventDefault();
        last.focus();
      } else if (!e.shiftKey && active === last) {
        e.preventDefault();
        first.focus();
      }
    }
  });

  // Per-tile / per-row keyboard activation: Enter or Space mirrors a click,
  // since <article>/<div role="button"> don't get the implicit Enter/Space
  // mapping that real <button> elements do.
  //
  // First press on a fresh tile mirrors single-click (selectTile). A second
  // press on the already-selected tile mirrors double-click (activateTile) —
  // this matches the mouse model and gives keyboard users a way to open
  // previews / navigate folders / download files, which used to require a
  // double-click only.
  scrollArea.addEventListener('keydown', function(e){
    const target = e.target.closest('.tile, .row:not(.row-head)');
    if (!target) return;
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      if (selected === target) activateTile(target);
      else selectTile(target);
    }
  });

  // ---------- 截图辅助 ----------
  if (location.hash === '#inspector') {
    const first = document.querySelector('.tile:not(.is-folder)');
    if (first) selectTile(first);
  }
  if (location.hash === '#drop') {
    dz.classList.add('show');
    dz.setAttribute('aria-hidden', 'false');
  }
  if (location.hash === '#dark') {
    applyTheme('dark');
  }
  if (location.hash === '#list') {
    vl.click();
  }

  // ---------- 启动 ----------
  renderCrumbs();
  render();
})();
</script>

</body>
