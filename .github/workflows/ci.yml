name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Formatting & lint — fastest checks first, fail fast
  # ─────────────────────────────────────────────────────────────────────
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -W clippy::all

  # ─────────────────────────────────────────────────────────────────────
  # Unit / integration tests across the feature matrix
  # ─────────────────────────────────────────────────────────────────────
  test-linux:
    name: test (linux · ${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - "webdav"                                # default
          - "webdav,http"
          - "webdav,api"
          - "webdav,http,api,serve"                 # everything except s3
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install FUSE
        run: sudo apt-get update && sudo apt-get install -y fuse3 libfuse3-dev
      - name: Run tests
        run: |
          if [ "${{ matrix.features }}" = "webdav" ]; then
            cargo test --all-features
          else
            cargo test --no-default-features --features "${{ matrix.features }}"
          fi
        env:
          RUST_LOG: rs_f4ss=warn

  test-windows:
    name: test (windows · webdav)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install WinFsp
        run: choco install winfsp --no-progress
      - name: Run tests
        run: cargo test --all-features
        env:
          RUST_LOG: rs_f4ss=warn

  # ─────────────────────────────────────────────────────────────────────
  # Release build — every feature combination that ships
  # ─────────────────────────────────────────────────────────────────────
  build:
    name: build (${{ matrix.target || 'linux' }} · ${{ matrix.features || 'all' }})
    runs-on: ${{ matrix.os || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            features: ""
            target: ""
            cmd: "build"
          - os: ubuntu-latest
            features: "webdav,http,api,serve"
            target: ""
            cmd: "build"
          - os: windows-latest
            features: ""
            target: "x86_64-pc-windows-msvc"
            cmd: "build"
          - os: windows-latest
            features: "webdav,http,api,serve"
            target: "x86_64-pc-windows-msvc"
            cmd: "build"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install FUSE (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fuse3 libfuse3-dev
      - name: Install WinFsp (Windows)
        if: runner.os == 'Windows'
        run: choco install winfsp --no-progress
      - name: cargo build
        run: |
          ARGS=(--release)
          if [ -n "${{ matrix.target }}" ]; then
            ARGS+=(--target "${{ matrix.target }}")
          fi
          if [ "${{ matrix.features }}" = "" ]; then
            cargo "${ARGS[@]}" build
          else
            cargo "${ARGS[@]}" build --no-default-features --features "${{ matrix.features }}"
          fi

  # ─────────────────────────────────────────────────────────────────────
  # E2E — runs the shell scripts against a real dufs server + FUSE
  # ─────────────────────────────────────────────────────────────────────
  e2e:
    name: e2e (linux)
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@dufs
        with:
          version: "0.43.0"
      - name: Install FUSE
        run: sudo apt-get update && sudo apt-get install -y fuse3 libfuse3-dev
      - name: Build release binary
        run: cargo build --release --all-features
      - name: Run E2E (FUSE mount)
        run: bash tests/e2e.sh
      - name: Run E2E (REST API)
        run: bash tests/e2e-api.sh
      - name: Run E2E (P2P share)
        run: bash tests/e2e-share.sh
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: |
            /tmp/rs-f4ss-*.log
            /tmp/dufs-*.log
          if-no-files-found: ignore
          retention-days: 7
