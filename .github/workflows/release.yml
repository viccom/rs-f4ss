name: Release

# Auto-builds and publishes a GitHub Release when a v* tag is pushed.
# Push a tag like v0.2.0 to trigger a fresh build of all 4 binary tar.gz
# artifacts and attach them to the release.
# Manual trigger is also supported for re-running a release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  # Tag name, e.g. "v0.2.0". Stored in env to keep it out of inline
  # shell strings (defence-in-depth against any future matrix expansion
  # that might interpolate user-controlled input).
  TAG: ${{ github.ref_name }}

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Linux — CLI (rs-f4ss) + Desktop (rs-f4ss-desktop, Tauri/GTK)
  # ─────────────────────────────────────────────────────────────────────
  build-linux:
    name: build (linux · ${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: rs-f4ss
            binary: rs-f4ss
            package: rs-f4ss-cli
          - target: rs-f4ss-desktop
            binary: rs-f4ss-desktop
            package: rs-f4ss-desktop
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install FUSE + Tauri/GTK system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fuse3 libfuse3-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            file
      - name: cargo build --release
        run: cargo build --release --all-features -p "${{ matrix.package }}"
      - name: Stage binary + docs
        run: |
          mkdir -p staging
          cp "target/release/${{ matrix.binary }}" staging/
          cp README.md LICENSE staging/
      - name: Package tar.gz
        env:
          BINARY: ${{ matrix.binary }}
        run: |
          cd staging
          tar -czf "../${BINARY}-${TAG}-x86_64-unknown-linux-gnu.tar.gz" .
      - name: Stage bare binary for self-update (CLI only)
        if: matrix.target == 'rs-f4ss'
        env:
          BINARY: ${{ matrix.binary }}
        run: cp "target/release/${BINARY}" "${BINARY}-${TAG}-linux-amd64"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-linux
          path: ${{ matrix.target }}-${{ env.TAG }}-x86_64-unknown-linux-gnu.tar.gz
          if-no-files-found: error
      - name: Upload bare binary artifact (CLI only)
        if: matrix.target == 'rs-f4ss'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-linux-bare
          path: ${{ matrix.binary }}-${{ env.TAG }}-linux-amd64
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────
  # Windows — CLI (rs-f4ss.exe) + Desktop (rs-f4ss-desktop.exe, Tauri)
  # ─────────────────────────────────────────────────────────────────────
  build-windows:
    name: build (windows · ${{ matrix.target }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: rs-f4ss
            binary: rs-f4ss.exe
            package: rs-f4ss-cli
          - target: rs-f4ss-desktop
            binary: rs-f4ss-desktop.exe
            package: rs-f4ss-desktop
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - name: Install WinFsp
        # The chocolatey `winfsp` package is currently marked "Possibly broken"
        # (v2.1.25156 packages the MSI in an OPC wrapper chocolatey can't
        # extract properly). Install the official MSI from GitHub Releases
        # directly.
        shell: pwsh
        run: |
          $url = "https://github.com/winfsp/winfsp/releases/download/v2.0/winfsp-2.0.23075.msi"
          $msi = "$env:TEMP\winfsp.msi"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $msi -UseBasicParsing
          $proc = Start-Process -FilePath "msiexec.exe" -ArgumentList "/i", $msi, "/qn", "/norestart" -Wait -PassThru
          Write-Host "msiexec exit code: $($proc.ExitCode)"
          if ($proc.ExitCode -ne 0) { exit $proc.ExitCode }
      - name: cargo build --release
        shell: bash
        run: cargo build --release --all-features -p "${{ matrix.package }}" --target x86_64-pc-windows-msvc
      - name: Stage binary + docs
        shell: bash
        run: |
          mkdir -p staging
          cp "target/x86_64-pc-windows-msvc/release/${{ matrix.binary }}" staging/
          cp README.md LICENSE staging/
      - name: Package tar.gz
        shell: bash
        env:
          BINARY: ${{ matrix.binary }}
        run: |
          cd staging
          # Archive name drops the .exe suffix on Windows so the asset
          # pattern stays consistent with the v0.2.0 release convention
          # (rs-f4ss-vX.Y.Z-…, not rs-f4ss.exe-vX.Y.Z-…).
          ARCHIVE="${BINARY%.exe}"
          tar -czf "../${ARCHIVE}-${TAG}-x86_64-pc-windows-msvc.tar.gz" .
      - name: Stage bare binary for self-update (CLI only)
        if: matrix.target == 'rs-f4ss'
        shell: bash
        env:
          BINARY: ${{ matrix.binary }}
        run: cp "target/x86_64-pc-windows-msvc/release/${BINARY}" "rs-f4ss-${TAG}-windows-amd64.exe"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-windows
          path: ${{ matrix.target }}-${{ env.TAG }}-x86_64-pc-windows-msvc.tar.gz
          if-no-files-found: error
      - name: Upload bare binary artifact (CLI only)
        if: matrix.target == 'rs-f4ss'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-windows-bare
          path: rs-f4ss-${{ env.TAG }}-windows-amd64.exe
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────
  # Publish — download all 4 tar.gz artifacts and attach to GitHub Release
  # ─────────────────────────────────────────────────────────────────────
  release:
    name: publish release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List downloaded assets
        run: ls -la artifacts/
      - name: Generate latest.json (self-update manifest)
        # `latest.json` is consumed by the in-process self-updater
        # (selfupdater::HttpSource) to decide whether a newer binary is
        # available. It points at the version-pinned download URL so the
        # checksum stays valid even after the next release is cut.
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          cd artifacts

          # Defence in depth: although git tag names cannot contain
          # shell metacharacters, the `tags: ['v*']` glob would match
          # a stray `v0.2.0-rc1` or `v0.2.0+meta`. The selfupdater
          # compares versions string-wise, so any non-canonical
          # suffix silently breaks version ordering. Reject anything
          # that is not exactly `v<major>.<minor>.<patch>`.
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: tag '${TAG}' does not match v<major>.<minor>.<patch>" >&2
            exit 1
          fi

          # Strip leading "v" from tag to keep semver clean (selfupdater
          # compares versions string-wise).
          VERSION="${TAG#v}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          LINUX_BIN="rs-f4ss-${TAG}-linux-amd64"
          WIN_BIN="rs-f4ss-${TAG}-windows-amd64.exe"

          if [[ ! -f "${LINUX_BIN}" ]]; then
            echo "ERROR: missing ${LINUX_BIN}" >&2
            exit 1
          fi
          if [[ ! -f "${WIN_BIN}" ]]; then
            echo "ERROR: missing ${WIN_BIN}" >&2
            exit 1
          fi

          LINUX_SHA=$(sha256sum "${LINUX_BIN}" | awk '{print $1}')
          LINUX_SIZE=$(stat -c%s "${LINUX_BIN}")
          WIN_SHA=$(sha256sum "${WIN_BIN}"  | awk '{print $1}')
          WIN_SIZE=$(stat -c%s "${WIN_BIN}")

          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          # Use printf to avoid heredoc indentation leaking into the JSON.
          printf '%s\n' \
            '{' \
            "  \"version\": \"${VERSION}\"," \
            "  \"date\":    \"${DATE}\"," \
            '  "assets": {' \
            "    \"linux/amd64\":   {\"url\": \"${BASE_URL}/${LINUX_BIN}\", \"sha256\": \"${LINUX_SHA}\", \"size\": ${LINUX_SIZE}}," \
            "    \"windows/amd64\": {\"url\": \"${BASE_URL}/${WIN_BIN}\",   \"sha256\": \"${WIN_SHA}\",   \"size\": ${WIN_SIZE}}" \
            '  }' \
            '}' > latest.json

          echo "--- latest.json ---"
          cat latest.json
          # Validate with python (preinstalled on ubuntu-latest)
          python3 -c "import json; json.load(open('latest.json'))" && echo "JSON OK"
          ls -la
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: rs-f4ss ${{ env.TAG }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/*.tar.gz
            artifacts/rs-f4ss-*-linux-amd64
            artifacts/rs-f4ss-*-windows-amd64.exe
            artifacts/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
